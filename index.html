<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://i.ibb.co">
    <title>Deuz_z | Portfolio VisDev</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0e0e0e;
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow-x: hidden;
        }

        header { padding: 80px 20px 50px; }
        h1 { margin: 0; font-size: 3rem; letter-spacing: 3px; font-weight: 700; text-transform: uppercase; }
        h2 { margin: 15px 0 0; font-size: 1rem; font-weight: 300; color: #888; text-transform: uppercase; letter-spacing: 2px; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .gallery img {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            border-radius: 2px;
            cursor: zoom-in;
            transition: opacity 0.3s ease;
            background-color: #1a1a1a;
            image-rendering: crisp-edges;
        }
        .gallery img:hover { opacity: 0.7; }

        /* Visor de imágenes (Lightbox) - Pantalla negra fija */
        #lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
            overflow: hidden; /* Importante para el paneo */
        }

        /* Ventana interna (Viewport) que contiene la imagen */
        #lightbox-viewport {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }
        
        #lightbox-img {
            /* Estado inicial: Encaja en la pantalla */
            max-width: 90%; max-height: 90vh;
            object-fit: contain;
            user-select: none;
            cursor: zoom-in; /* Cursor de lupa inicial */
            
            /* Transición suave para scale, pero INSTANTÁNEA para translate al panear */
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            
            /* Punto de transformación central */
            transform-origin: center center;
            will-change: transform; /* Optimización */
        }

        /* Estilo para cuando la imagen está en zoom profundo (paneable) */
        #lightbox-img.panning {
            cursor: grab; /* Mano abierta para 'agarrar' */
            transition: transform 0.1s ease; /* Transición rápida para que siga el ratón */
        }

        #lightbox-img.grabbing {
            cursor: grabbing !important; /* Mano cerrada al arrastrar */
        }

        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            font-size: 2.5rem; color: rgba(255, 255, 255, 0.2);
            cursor: pointer; padding: 40px; transition: 0.3s;
            z-index: 1010;
        }
        .nav-arrow:hover { color: #fff; }
        #prev { left: 0; }
        #next { right: 0; }

        footer { padding: 80px 20px; font-size: 0.9rem; }
        a { color: #fff; text-decoration: none; border-bottom: 1px solid #333; transition: 0.3s; }
        a:hover { border-color: #fff; }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Deuz_z</h1>
        <h2>Artista Digital VisDev Junior</h2>
    </header>

    <main class="gallery" id="gallery-container"></main>

    <div id="lightbox">
        <span id="prev" class="nav-arrow" onclick="changeImg(event, -1)">&#10094;</span>
        
        <div id="lightbox-viewport" onclick="closeLightboxOutside(event)">
            <img id="lightbox-img" src="" alt="Zoom" onclick="toggleZoom(event)">
        </div>

        <span id="next" class="nav-arrow" onclick="changeImg(event, 1)">&#10095;</span>
    </div>

    <footer>
        <p><a href="mailto:deuzarte@gmail.com">deuzarte@gmail.com</a></p>
        <p><a href="https://instagram.com/deuz__z" target="_blank">@deuz__z</a></p>
    </footer>

    <script>
        const imgUrls = [
            'https://i.ibb.co/chWKhf8Y/1.jpg', 'https://i.ibb.co/VcPcyDVp/2.jpg',
            'https://i.ibb.co/HfKsX8vX/3.jpg', 'https://i.ibb.co/60jbz25G/4.jpg',
            'https://i.ibb.co/YFptQF07/5.jpg', 'https://i.ibb.co/v6nZvz22/6.jpg',
            'https://i.ibb.co/RGGRPY0N/7.jpg', 'https://i.ibb.co/2VPwnXW/8.jpg',
            'https://i.ibb.co/B2w6tjKd/9.jpg', 'https://i.ibb.co/vxdS4YF7/10.jpg',
            'https://i.ibb.co/vxQ9fnXs/11.jpg', 'https://i.ibb.co/j24K7gQ/12.jpg',
            'https://i.ibb.co/F4zzSgwW/13.jpg', 'https://i.ibb.co/wFrM7YJC/14.jpg',
            'https://i.ibb.co/YFP2fGfP/15.jpg', 'https://i.ibb.co/ZzGn4YbK/16.jpg',
            'https://i.ibb.co/QFwdBc71/17.jpg', 'https://i.ibb.co/rf4m89Gj/18.jpg',
            'https://i.ibb.co/6zBJjJH/19.jpg', 'https://i.ibb.co/wFCq4RfB/20.jpg',
            'https://i.ibb.co/S7w9Cx0z/21.jpg', 'https://i.ibb.co/BVHjCZxw/22.jpg',
            'https://i.ibb.co/vvYVmpBF/23.jpg', 'https://i.ibb.co/4gJR2C3M/24.jpg',
            'https://i.ibb.co/RGnXYr4c/25.jpg'
        ];

        const gallery = document.getElementById('gallery-container');
        let currentIndex = 0;

        // Variables de estado del Zoom y Paneo
        let scale = 1;
        let panning = false;
        let pointX = 0, pointY = 0, startX = 0, startY = 0;
        const defaultScale = 1;
        // Escala automática al tamaño del lienzo (puedes ajustar este valor, ej: 2.5)
        const zoomedScale = 2.5; 

        imgUrls.forEach((url, index) => {
            const img = document.createElement('img');
            img.src = url;
            img.loading = "lazy";
            img.decoding = "async"; 
            img.onclick = () => openLightbox(index);
            gallery.appendChild(img);
        });

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxViewport = document.getElementById('lightbox-viewport');

        function openLightbox(index) {
            currentIndex = index;
            lightboxImg.src = imgUrls[currentIndex];
            resetZoom(); // Reset estado inicial
            lightbox.style.display = 'flex';
        }

        function changeImg(event, direction) {
            if(event) event.stopPropagation();
            currentIndex = (currentIndex + direction + imgUrls.length) % imgUrls.length;
            
            lightboxImg.src = imgUrls[currentIndex];
            resetZoom(); // Importante: Resetear zoom al cambiar de foto
        }

        function closeLightbox() { 
            lightbox.style.display = 'none'; 
            resetZoom();
        }

        // Cierra el visor si se hace clic fuera de la imagen
        function closeLightboxOutside(event) {
            if (event.target === lightboxViewport && scale === 1) {
                closeLightbox();
            }
        }

        // Función principal para activar/desactivar Zoom profundo
        function toggleZoom(event) {
            event.stopPropagation(); // No cierra el lightbox al clickear la imagen

            if (scale === 1) {
                // ACTIVAR ZOOM PROFUNDO (Paneable)
                scale = zoomedScale;
                lightboxImg.classList.add('panning');
                lightboxImg.style.transition = 'transform 0.3s ease'; // Transición suave al escalar
                updateTransform(0, 0); // Empieza centrado
            } else {
                // DESACTIVAR ZOOM PROFUNDO
                resetZoom();
            }
        }

        function resetZoom() {
            scale = 1;
            pointX = 0; pointY = 0; startX = 0; startY = 0;
            lightboxImg.classList.remove('panning', 'grabbing');
            // Transición suave al volver al tamaño normal
            lightboxImg.style.transition = 'transform 0.3s ease'; 
            updateTransform(0, 0);
            lightboxImg.style.cursor = 'zoom-in';
        }

        // Función para aplicar la transformación (scale + translate)
        function updateTransform(x = pointX, y = pointY) {
            // Se calcula aquí para asegurar la respuesta rápida al arrastrar
            // scale(1) translate(0,0) inicial
            // scale(2.5) translate(X,Y) al panear
            lightboxImg.style.transform = `scale(${scale}) translate(${x}px, ${y}px)`;
        }

        // --- LÓGICA DE ARRASTRE (MOUSE PANNING) ---

        lightboxImg.onmousedown = function (e) {
            if (scale === 1) return; // Solo arrastrar si hay zoom
            e.preventDefault(); // Evita arrastre nativo de imagen
            
            panning = true;
            lightboxImg.classList.add('grabbing');
            
            // Calculamos la posición relativa del ratón respecto a la imagen paneada
            startX = e.clientX - pointX * scale; 
            startY = e.clientY - pointY * scale;
            
            // Desactivamos transición durante el arrastre para respuesta instantánea
            lightboxImg.style.transition = 'none'; 
        };

        window.onmousemove = function (e) {
            if (!panning || scale === 1) return;
            e.preventDefault();

            // Calculamos nueva posición tentativa
            let newX = (e.clientX - startX) / scale;
            let newY = (e.clientY - startY) / scale;

            // CALCULAMOS LÍMITES DE PANEO (Crucial para ver toda la imagen)
            const imgRect = lightboxImg.getBoundingClientRect();
            const viewRect = lightboxViewport.getBoundingClientRect();

            // Tamaño visual real de la imagen escalada
            const visualWidth = imgRect.width;
            const visualHeight = imgRect.height;

            // Paneo máximo horizontal (maxX) y vertical (maxY) permitido
            // Se basa en la diferencia entre el tamaño escalado y el viewport
            const maxX = Math.max(0, (visualWidth - viewRect.width) / 2 / scale);
            const maxY = Math.max(0, (visualHeight - viewRect.height) / 2 / scale);

            // APLICAMOS LÍMITES: pointX y pointY nunca superan maxX y maxY
            pointX = Math.max(-maxX, Math.min(maxX, newX));
            pointY = Math.max(-maxY, Math.min(maxY, newY));

            updateTransform(); // Actualizamos la imagen
        };

        window.onmouseup = function () {
            panning = false;
            if (scale !== 1) {
                lightboxImg.classList.remove('grabbing');
                // Reactivamos transición para cuando se suelta y ajusta la posición
                lightboxImg.style.transition = 'transform 0.1s ease'; 
            }
        };

        // Teclado
        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'flex') {
                if (e.key === 'ArrowRight') changeImg(null, 1);
                if (e.key === 'ArrowLeft') changeImg(null, -1);
                if (e.key === 'Escape') closeLightbox();
            }
        });
    </script>
</body>
</html>
