<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noai, noimageai">
    <link rel="preconnect" href="https://i.ibb.co">
    
    <title>Deuz_z | Portfolio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0e0e0e;
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow-x: hidden;
        }

        header { padding: 80px 20px 50px; }
        h1 { margin: 0; font-size: 3rem; letter-spacing: 3px; font-weight: 700; text-transform: uppercase; }
        
        /* ArtStation Link Style - Llamativo con color oficial */
        .artstation-container {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .artstation-link {
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            color: #ffffff;
            /* Color azul oficial de ArtStation */
            background-color: #13aff0; 
            border-radius: 4px;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
        }
        .artstation-link:hover {
            /* Un azul un poco más oscuro al pasar el ratón */
            background-color: #0d8ec4; 
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
        }
        .artstation-link svg {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            fill: #ffffff; /* Logo blanco para contraste */
        }

        h2 { margin: 15px 0 0; font-size: 1rem; font-weight: 300; color: #888; text-transform: uppercase; letter-spacing: 2px; }

        /* Galería tipo Mosaico (Masonry) sin recortar imágenes y sin huecos negros horizontales */
        .gallery {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            column-count: 3; /* Número de columnas en PC */
            column-gap: 15px; /* Espacio entre columnas */
        }
        .gallery img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 15px; /* Espacio vertical exacto entre imágenes */
            border-radius: 2px;
            cursor: zoom-in;
            transition: opacity 0.3s ease;
            background-color: #1a1a1a;
            image-rendering: crisp-edges;
            /* Evita que una imagen se corte a la mitad al final de una columna */
            break-inside: avoid-column; 
        }
        .gallery img:hover { opacity: 0.7; }

        /* Visor de imágenes (Lightbox) - Pantalla negra fija */
        #lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
            overflow: hidden;
        }

        /* Ventana interna (Viewport) que contiene la imagen */
        #lightbox-viewport {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }
        
        #lightbox-img {
            max-width: 90%; max-height: 90vh;
            object-fit: contain;
            user-select: none;
            cursor: zoom-in;
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            transform-origin: center center;
            will-change: transform;
        }

        #lightbox-img.panning {
            cursor: grab;
            transition: transform 0.1s ease;
        }

        #lightbox-img.grabbing {
            cursor: grabbing !important;
        }

        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            font-size: 2.5rem; color: rgba(255, 255, 255, 0.2);
            cursor: pointer; padding: 40px; transition: 0.3s;
            z-index: 1010;
        }
        .nav-arrow:hover { color: #fff; }
        #prev { left: 0; }
        #next { right: 0; }

        footer { padding: 80px 20px; font-size: 0.9rem; }
        footer p { margin: 10px 0; color: #666; }
        a { color: #fff; text-decoration: none; border-bottom: 1px solid #333; padding-bottom: 2px; transition: 0.3s; }
        a:hover { border-color: #fff; }

        @media (max-width: 1000px) {
            .gallery { column-count: 2; }
        }
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .gallery { column-count: 1; column-gap: 0; }
            .nav-arrow { padding: 20px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Deuz_z</h1>
        
        <div class="artstation-container">
            <a href="https://www.artstation.com/deuz_z" target="_blank" class="artstation-link">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0 17.723l2.027-3.505h2.463L.263 21.458zm24 0L13.784 0h-4.08l4.49 7.766h4.555l-3.321 5.753zM10.23 11.218l-2.021 3.5h9.06l2.026-3.5zM8.203 14.718L4.148 21.742h16.195l-4.053-7.024z"/>
                </svg>
                ArtStation
            </a>
        </div>
        
        <h2>VisDev Artist & Technical Artist Junior</h2>
    </header>

    <main class="gallery" id="gallery-container"></main>

    <div id="lightbox">
        <span id="prev" class="nav-arrow" onclick="changeImg(event, -1)">&#10094;</span>
        
        <div id="lightbox-viewport" onclick="closeLightboxOutside(event)">
            <img id="lightbox-img" src="" alt="Zoom" onclick="toggleZoom(event)">
        </div>

        <span id="next" class="nav-arrow" onclick="changeImg(event, 1)">&#10095;</span>
    </div>

    <footer>
        <p><a href="mailto:deuzarte@gmail.com">deuzarte@gmail.com</a></p>
        <p><a href="https://instagram.com/deuz__z" target="_blank">@deuz__z</a></p>
    </footer>

    <script>
        const imgUrls = [
            'https://i.ibb.co/chWKhf8Y/1.jpg', 'https://i.ibb.co/VcPcyDVp/2.jpg',
            'https://i.ibb.co/HfKsX8vX/3.jpg', 'https://i.ibb.co/60jbz25G/4.jpg',
            'https://i.ibb.co/YFptQF07/5.jpg', 'https://i.ibb.co/v6nZvz22/6.jpg',
            'https://i.ibb.co/RGGRPY0N/7.jpg', 'https://i.ibb.co/2VPwnXW/8.jpg',
            'https://i.ibb.co/B2w6tjKd/9.jpg', 'https://i.ibb.co/vxdS4YF7/10.jpg',
            'https://i.ibb.co/vxQ9fnXs/11.jpg', 'https://i.ibb.co/j24K7gQ/12.jpg',
            'https://i.ibb.co/F4zzSgwW/13.jpg', 'https://i.ibb.co/wFrM7YJC/14.jpg',
            'https://i.ibb.co/YFP2fGfP/15.jpg', 'https://i.ibb.co/ZzGn4YbK/16.jpg',
            'https://i.ibb.co/QFwdBc71/17.jpg', 'https://i.ibb.co/rf4m89Gj/18.jpg',
            'https://i.ibb.co/6zBJjJH/19.jpg', 'https://i.ibb.co/wFCq4RfB/20.jpg',
            'https://i.ibb.co/S7w9Cx0z/21.jpg', 'https://i.ibb.co/BVHjCZxw/22.jpg',
            'https://i.ibb.co/vvYVmpBF/23.jpg', 'https://i.ibb.co/4gJR2C3M/24.jpg',
            'https://i.ibb.co/RGnXYr4c/25.jpg'
        ];

        const gallery = document.getElementById('gallery-container');
        let currentIndex = 0;

        let scale = 1;
        let panning = false;
        let pointX = 0, pointY = 0, startX = 0, startY = 0;
        const defaultScale = 1;
        const zoomedScale = 2.5; 

        imgUrls.forEach((url, index) => {
            const img = document.createElement('img');
            img.src = url;
            img.loading = "lazy";
            img.decoding = "async"; 
            img.onclick = () => openLightbox(index);
            gallery.appendChild(img);
        });

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxViewport = document.getElementById('lightbox-viewport');

        function openLightbox(index) {
            currentIndex = index;
            lightboxImg.src = imgUrls[currentIndex];
            resetZoom();
            lightbox.style.display = 'flex';
        }

        function changeImg(event, direction) {
            if(event) event.stopPropagation();
            currentIndex = (currentIndex + direction + imgUrls.length) % imgUrls.length;
            lightboxImg.src = imgUrls[currentIndex];
            resetZoom();
        }

        function closeLightbox() { 
            lightbox.style.display = 'none'; 
            resetZoom();
        }

        function closeLightboxOutside(event) {
            if (event.target === lightboxViewport && scale === 1) {
                closeLightbox();
            }
        }

        function toggleZoom(event) {
            event.stopPropagation();
            if (scale === 1) {
                scale = zoomedScale;
                lightboxImg.classList.add('panning');
                lightboxImg.style.transition = 'transform 0.3s ease';
                updateTransform(0, 0);
            } else {
                resetZoom();
            }
        }

        function resetZoom() {
            scale = 1;
            pointX = 0; pointY = 0; startX = 0; startY = 0;
            lightboxImg.classList.remove('panning', 'grabbing');
            lightboxImg.style.transition = 'transform 0.3s ease'; 
            updateTransform(0, 0);
            lightboxImg.style.cursor = 'zoom-in';
        }

        function updateTransform(x = pointX, y = pointY) {
            lightboxImg.style.transform = `scale(${scale}) translate(${x}px, ${y}px)`;
        }

        lightboxImg.onmousedown = function (e) {
            if (scale === 1) return;
            e.preventDefault();
            panning = true;
            lightboxImg.classList.add('grabbing');
            startX = e.clientX - pointX * scale; 
            startY = e.clientY - pointY * scale;
            lightboxImg.style.transition = 'none'; 
        };

        window.onmousemove = function (e) {
            if (!panning || scale === 1) return;
            e.preventDefault();

            let newX = (e.clientX - startX) / scale;
            let newY = (e.clientY - startY) / scale;

            const imgRect = lightboxImg.getBoundingClientRect();
            const viewRect = lightboxViewport.getBoundingClientRect();

            const visualWidth = imgRect.width;
            const visualHeight = imgRect.height;

            const maxX = Math.max(0, (visualWidth - viewRect.width) / 2 / scale);
            const maxY = Math.max(0, (visualHeight - viewRect.height) / 2 / scale);

            pointX = Math.max(-maxX, Math.min(maxX, newX));
            pointY = Math.max(-maxY, Math.min(maxY, newY));

            updateTransform();
        };

        window.onmouseup = function () {
            panning = false;
            if (scale !== 1) {
                lightboxImg.classList.remove('grabbing');
                lightboxImg.style.transition = 'transform 0.1s ease'; 
            }
        };

        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'flex') {
                if (e.key === 'ArrowRight') changeImg(null, 1);
                if (e.key === 'ArrowLeft') changeImg(null, -1);
                if (e.key === 'Escape') closeLightbox();
            }
        });
    </script>
</body>
</html>
